<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VPN Admin</title>
<style>
  :root {
    --bg: #0f1117;
    --bg2: #161b27;
    --bg3: #1e2535;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #e8eaf0;
    --text2: #8b92a8;
    --text3: #555e75;
    --accent: #4f8ef7;
    --accent-bg: rgba(79,142,247,0.12);
    --green: #34d399;
    --green-bg: rgba(52,211,153,0.1);
    --yellow: #fbbf24;
    --yellow-bg: rgba(251,191,36,0.1);
    --red: #f87171;
    --red-bg: rgba(248,113,113,0.1);
    --gray: #6b7280;
    --gray-bg: rgba(107,114,128,0.12);
    --radius: 10px;
    --radius-sm: 6px;
    --font: 'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --mono: 'SF Mono','Fira Code','Fira Mono',monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

  /* Login */
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; background: var(--bg);
  }
  .login-box {
    width: 340px; background: var(--bg2); border: 1px solid var(--border);
    border-radius: 16px; padding: 2rem; text-align: center;
  }
  .login-box h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  .login-box p { color: var(--text2); font-size: 13px; margin-bottom: 1.5rem; }
  .login-box input {
    width: 100%; padding: 10px 14px; background: var(--bg3); border: 1px solid var(--border2);
    border-radius: var(--radius-sm); color: var(--text); font-family: var(--font);
    font-size: 14px; margin-bottom: 12px; outline: none;
  }
  .login-box input:focus { border-color: var(--accent); }

  /* Layout */
  #app { display: none; }
  .topnav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px; background: var(--bg2); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 50;
  }
  .topnav-left { display: flex; align-items: center; gap: 10px; }
  .logo { font-size: 15px; font-weight: 600; color: var(--text); }
  .logo span { color: var(--accent); }
  .base-url-tag {
    font-size: 11px; font-family: var(--mono); background: var(--bg3);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 3px 8px; color: var(--text2);
  }
  .main { max-width: 1100px; margin: 0 auto; padding: 24px; }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 24px; }
  .stat { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; }
  .stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .stat-val { font-size: 26px; font-weight: 600; line-height: 1; }
  .stat-sub { font-size: 11px; color: var(--text2); margin-top: 4px; }

  /* Card */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .card-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .card-title { font-size: 14px; font-weight: 500; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: var(--radius-sm); font-size: 13px;
    font-family: var(--font); cursor: pointer; border: 1px solid var(--border2);
    background: transparent; color: var(--text); transition: all 0.15s;
  }
  .btn:hover { background: var(--bg3); border-color: var(--border2); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { background: #3d7ae8; border-color: #3d7ae8; }
  .btn-danger { color: var(--red); border-color: transparent; }
  .btn-danger:hover { background: var(--red-bg); border-color: var(--red); }
  .btn-ghost { border-color: transparent; color: var(--text2); padding: 6px 10px; }
  .btn-ghost:hover { background: var(--bg3); color: var(--text); }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn-icon { padding: 6px; border-radius: var(--radius-sm); }

  /* Filter bar */
  .filter-bar { display: flex; gap: 10px; padding: 14px 20px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .filter-bar input, .filter-bar select {
    padding: 7px 12px; background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text); font-family: var(--font);
    font-size: 13px; outline: none;
  }
  .filter-bar input { width: 200px; }
  .filter-bar input:focus, .filter-bar select:focus { border-color: var(--accent); }

  /* Table */
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase;
       letter-spacing: 0.06em; padding: 10px 20px; border-bottom: 1px solid var(--border); }
  td { padding: 12px 20px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: rgba(255,255,255,0.02); }

  /* Badge */
  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge::before { content:''; width:6px; height:6px; border-radius:50%; display:inline-block; }
  .badge-active { background: var(--green-bg); color: var(--green); }
  .badge-active::before { background: var(--green); }
  .badge-expiring { background: var(--yellow-bg); color: var(--yellow); }
  .badge-expiring::before { background: var(--yellow); animation: pulse 1.5s infinite; }
  .badge-expired { background: var(--red-bg); color: var(--red); }
  .badge-expired::before { background: var(--red); }
  .badge-paused { background: var(--gray-bg); color: var(--gray); }
  .badge-paused::before { background: var(--gray); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* Avatar */
  .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }

  /* Progress */
  .prog-wrap { width: 70px; background: var(--bg3); border-radius: 3px; height: 3px; overflow: hidden; margin-top: 5px; }
  .prog { height: 3px; border-radius: 3px; transition: width 0.3s; }

  /* Server tags */
  .stags { display: flex; flex-wrap: wrap; gap: 4px; }
  .stag { font-size: 10px; padding: 2px 7px; border-radius: 4px; background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }

  /* Link copy row */
  .link-copy { display: flex; align-items: center; gap: 6px; }
  .link-text { font-family: var(--mono); font-size: 10px; color: var(--text2); max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* Modal */
  .modal-bg {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(4px);
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--bg2); border: 1px solid var(--border2); border-radius: 14px;
    padding: 0; width: 460px; max-width: 96vw; max-height: 90vh; overflow-y: auto;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5);
  }
  .modal-head { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; border-bottom: 1px solid var(--border); }
  .modal-head h2 { font-size: 15px; font-weight: 600; }
  .modal-body { padding: 20px 22px; }
  .modal-foot { display: flex; justify-content: flex-end; gap: 8px; padding: 16px 22px; border-top: 1px solid var(--border); }

  /* Tabs inside modal */
  .mtabs { display: flex; gap: 2px; background: var(--bg3); border-radius: var(--radius-sm); padding: 3px; margin-bottom: 18px; }
  .mtab { flex: 1; text-align: center; padding: 6px; font-size: 13px; border-radius: 5px; cursor: pointer; color: var(--text2); border: none; background: transparent; font-family: var(--font); transition: all 0.15s; }
  .mtab.active { background: var(--bg2); color: var(--text); font-weight: 500; border: 1px solid var(--border); }

  /* Form fields */
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; color: var(--text2); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.04em; }
  .field input, .field select {
    width: 100%; padding: 9px 12px; background: var(--bg3); border: 1px solid var(--border2);
    border-radius: var(--radius-sm); color: var(--text); font-family: var(--font); font-size: 13px; outline: none;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* Server checkboxes */
  .srv-list { display: flex; flex-direction: column; gap: 2px; }
  .srv-item {
    display: flex; align-items: center; gap: 12px; padding: 10px 12px;
    border-radius: var(--radius-sm); cursor: pointer; transition: background 0.1s;
  }
  .srv-item:hover { background: var(--bg3); }
  .srv-item input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
  .srv-item-info { flex: 1; }
  .srv-item-name { font-size: 13px; font-weight: 500; }
  .srv-item-key { font-size: 10px; font-family: var(--mono); color: var(--text3); margin-top: 2px; max-width: 340px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* Link box */
  .link-box {
    background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 10px 12px; font-family: var(--mono); font-size: 11px; color: var(--text2);
    word-break: break-all; line-height: 1.6;
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; right: 24px; background: var(--bg3);
    border: 1px solid var(--border2); border-radius: var(--radius-sm);
    padding: 10px 18px; font-size: 13px; color: var(--text);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4); opacity: 0;
    transition: opacity 0.2s; pointer-events: none; z-index: 200;
  }
  .toast.show { opacity: 1; }

  .empty { text-align: center; padding: 3rem; color: var(--text3); font-size: 14px; }
  .loading { text-align: center; padding: 2rem; color: var(--text3); }
  .actions { display: flex; gap: 4px; }
  .name-cell { display: flex; align-items: center; gap: 10px; }
  .name-info .name { font-weight: 500; font-size: 13px; }
  .name-info .contact { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .date-cell .end-date { font-size: 13px; }
  .date-cell .days-left { font-size: 11px; margin-top: 3px; }

  @media (max-width: 768px) {
    .stats { grid-template-columns: repeat(2,1fr); }
    .main { padding: 14px; }
    td:nth-child(4), th:nth-child(4),
    td:nth-child(5), th:nth-child(5) { display: none; }
  }
</style>
</head>
<body>

<!-- Login screen -->
<div id="login-screen">
  <div class="login-box">
    <h1>VPN <span style="color:var(--accent)">Admin</span></h1>
    <p>Введите ключ для доступа к панели</p>
    <input type="password" id="login-key" placeholder="Admin Key" onkeydown="if(event.key==='Enter')doLogin()">
    <input type="text" id="login-url" placeholder="Base URL (https://vpnjr.vercel.app)" style="margin-bottom:16px">
    <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="doLogin()">Войти</button>
    <div id="login-err" style="color:var(--red);font-size:12px;margin-top:10px;display:none">Неверный ключ</div>
  </div>
</div>

<!-- Main app -->
<div id="app">
  <nav class="topnav">
    <div class="topnav-left">
      <span class="logo">VPN <span>Panel</span></span>
      <span class="base-url-tag" id="url-tag"></span>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="logout()">Выйти</button>
  </nav>

  <div class="main">
    <div class="stats" id="stats-row">
      <div class="stat"><div class="stat-label">Всего</div><div class="stat-val" id="s-total">—</div></div>
      <div class="stat"><div class="stat-label">Активных</div><div class="stat-val" id="s-active" style="color:var(--green)">—</div></div>
      <div class="stat"><div class="stat-label">Истекают</div><div class="stat-val" id="s-expiring" style="color:var(--yellow)">—</div></div>
      <div class="stat"><div class="stat-label">Просрочено</div><div class="stat-val" id="s-expired" style="color:var(--red)">—</div></div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-title">Пользователи</span>
        <button class="btn btn-primary btn-sm" onclick="openAdd()">+ Добавить</button>
      </div>
      <div class="filter-bar">
        <input type="text" id="search" placeholder="Поиск..." oninput="renderTable()">
        <select id="fstatus" onchange="renderTable()">
          <option value="">Все статусы</option>
          <option value="active">Активные</option>
          <option value="expiring">Истекают</option>
          <option value="expired">Просрочены</option>
          <option value="paused">Пауза</option>
        </select>
      </div>
      <div id="table-wrap"><div class="loading">Загрузка...</div></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-bg" id="modal" onclick="if(event.target===this)closeModal()">
<div class="modal">
  <div class="modal-head">
    <h2 id="modal-title">Новый пользователь</h2>
    <button class="btn btn-ghost btn-icon" onclick="closeModal()">✕</button>
  </div>
  <div class="modal-body">
    <div class="mtabs">
      <button class="mtab active" onclick="switchTab('info',this)">Основное</button>
      <button class="mtab" onclick="switchTab('servers',this)">Серверы</button>
      <button class="mtab" onclick="switchTab('link',this)">Ссылка</button>
    </div>

    <div id="tab-info">
      <div class="field-row">
        <div class="field"><label>Имя</label><input id="m-name" placeholder="Иван Петров"></div>
        <div class="field"><label>Telegram</label><input id="m-contact" placeholder="@username"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Дата начала</label><input id="m-start" type="date"></div>
        <div class="field"><label>Длительность</label>
          <select id="m-days">
            <option value="30">30 дней</option>
            <option value="60">60 дней</option>
            <option value="90">90 дней</option>
            <option value="180">180 дней</option>
            <option value="365">1 год</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field"><label>Статус</label>
          <select id="m-status">
            <option value="active">Активна</option>
            <option value="paused">Пауза</option>
          </select>
        </div>
        <div class="field"><label>Заметка</label><input id="m-note" placeholder="Необязательно"></div>
      </div>
    </div>

    <div id="tab-servers" style="display:none">
      <div class="srv-list" id="srv-list">
        <div class="loading">Загрузка серверов...</div>
      </div>
    </div>

    <div id="tab-link" style="display:none">
      <div class="field">
        <label>Токен</label>
        <div style="display:flex;gap:8px">
          <input id="m-token" style="font-family:var(--mono);font-size:11px" readonly>
          <button class="btn btn-sm" onclick="regenToken()">обновить</button>
        </div>
      </div>
      <div class="field">
        <label>Ссылка подписки</label>
        <div class="link-box" id="m-link-preview">—</div>
        <button class="btn btn-sm" style="margin-top:8px" onclick="copyModalLink()">Скопировать ссылку</button>
      </div>
    </div>
  </div>
  <div class="modal-foot">
    <button class="btn" onclick="closeModal()">Отмена</button>
    <button class="btn btn-primary" onclick="saveUser()">Сохранить</button>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
let ADMIN_KEY = "";
let BASE_URL = "";
let users = [];
let servers = [];
let editId = null;

const AVATAR_COLORS = [
  ["#1e3a5c","#4f8ef7"],["#1a3d2e","#34d399"],["#3d1a1a","#f87171"],
  ["#2d1f3d","#a78bfa"],["#3d2e0a","#fbbf24"],["#1a2d3d","#38bdf8"]
];

function fmtDate(d) { return new Date(d).toISOString().slice(0,10); }
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); return r; }
function today() { return fmtDate(new Date()); }

function getStatus(u) {
  if (u.status === "paused") return "paused";
  if (!u.start || !u.days) return "active";
  const end = addDays(u.start, parseInt(u.days));
  const diff = Math.ceil((end - new Date()) / 86400000);
  if (diff < 0) return "expired";
  if (diff <= 7) return "expiring";
  return "active";
}
function getDaysLeft(u) {
  if (!u.start || !u.days) return null;
  return Math.ceil((addDays(u.start, parseInt(u.days)) - new Date()) / 86400000);
}
function statusLabel(s) {
  return {active:"Активна",expiring:"Истекает",expired:"Истекла",paused:"Пауза"}[s];
}

// ─── API ────────────────────────────────────────────────────────────────────

async function api(method, path, body) {
  const opts = {
    method,
    headers: { "x-admin-key": ADMIN_KEY, "Content-Type": "application/json" }
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(`${BASE_URL}${path}`, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function loadUsers() { users = await api("GET", "/api/admin/users"); }
async function loadServers() { servers = await api("GET", "/api/admin/servers"); }

// ─── Login ───────────────────────────────────────────────────────────────────

async function doLogin() {
  const key = document.getElementById("login-key").value.trim();
  const url = (document.getElementById("login-url").value.trim() || "https://vpnjr.vercel.app").replace(/\/$/,"");
  if (!key) return;
  ADMIN_KEY = key;
  BASE_URL = url;
  try {
    await loadUsers();
    await loadServers();
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app").style.display = "block";
    document.getElementById("url-tag").textContent = url.replace("https://","");
    renderStats();
    renderTable();
    document.getElementById("login-err").style.display = "none";
  } catch(e) {
    document.getElementById("login-err").style.display = "block";
  }
}

function logout() {
  ADMIN_KEY = ""; BASE_URL = ""; users = []; servers = [];
  document.getElementById("app").style.display = "none";
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("login-key").value = "";
}

// ─── Stats ────────────────────────────────────────────────────────────────────

function renderStats() {
  let active=0, expiring=0, expired=0;
  users.forEach(u => {
    const s = getStatus(u);
    if(s==="active") active++;
    else if(s==="expiring") expiring++;
    else if(s==="expired") expired++;
  });
  document.getElementById("s-total").textContent = users.length;
  document.getElementById("s-active").textContent = active;
  document.getElementById("s-expiring").textContent = expiring;
  document.getElementById("s-expired").textContent = expired;
}

// ─── Table ────────────────────────────────────────────────────────────────────

function renderTable() {
  const q = document.getElementById("search").value.toLowerCase();
  const fs = document.getElementById("fstatus").value;
  let list = users.filter(u => {
    if (q && !u.name?.toLowerCase().includes(q) && !(u.contact||"").toLowerCase().includes(q)) return false;
    if (fs && getStatus(u) !== fs) return false;
    return true;
  });

  if (!list.length) {
    document.getElementById("table-wrap").innerHTML = `<div class="empty">Нет пользователей</div>`;
    return;
  }

  const rows = list.map((u, i) => {
    const s = getStatus(u);
    const dl = getDaysLeft(u);
    const pct = u.days ? Math.max(0, Math.min(100, Math.round((dl / parseInt(u.days)) * 100))) : 0;
    const progColor = s==="expired"?"var(--red)":s==="expiring"?"var(--yellow)":"var(--green)";
    const ci = i % AVATAR_COLORS.length;
    const [abg, atxt] = AVATAR_COLORS[ci];
    const initials = (u.name||"?").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
    const endDate = u.start && u.days ? fmtDate(addDays(u.start, parseInt(u.days))) : "—";
    const daysHtml = s==="paused" ? `<span style="color:var(--text3)">—</span>`
      : s==="expired" ? `<span style="color:var(--red);font-size:11px">${Math.abs(dl)} дн назад</span>`
      : s==="expiring" ? `<span style="color:var(--yellow);font-size:11px;font-weight:600">${dl} дн</span>`
      : `<span style="color:var(--text2);font-size:11px">${dl} дн</span>`;

    const userServers = (() => { try { return JSON.parse(u.servers||"[]"); } catch { return []; } })();
    const serverTags = userServers.map(sid => {
      const sv = servers.find(x => x.id === sid);
      return sv ? `<span class="stag">${sv.name || sid}</span>` : `<span class="stag">${sid}</span>`;
    }).join("");

    const link = `${BASE_URL}/api/u/${u.token}`;

    return `<tr>
      <td>
        <div class="name-cell">
          <div class="avatar" style="background:${abg};color:${atxt}">${initials}</div>
          <div class="name-info">
            <div class="name">${u.name||"—"}</div>
            <div class="contact">${u.contact||""}</div>
          </div>
        </div>
      </td>
      <td><span class="badge badge-${s}">${statusLabel(s)}</span></td>
      <td>
        <div class="date-cell">
          <div class="end-date">${endDate}</div>
          <div class="days-left">${daysHtml}</div>
          ${dl!==null && dl>0 ? `<div class="prog-wrap"><div class="prog" style="width:${pct}%;background:${progColor}"></div></div>` : ""}
        </div>
      </td>
      <td><div class="stags">${serverTags||"<span style='color:var(--text3)'>—</span>"}</div></td>
      <td>
        <div class="link-copy">
          <span class="link-text" title="${link}">/api/u/${u.token?.slice(0,8)}…</span>
          <button class="btn btn-ghost btn-icon btn-sm" onclick="copyText('${link}')" title="Скопировать">⎘</button>
        </div>
      </td>
      <td>
        <div class="actions">
          <button class="btn btn-ghost btn-sm" onclick="editUser('${u._id}')">✎</button>
          <button class="btn btn-danger btn-sm" onclick="deleteUser('${u._id}','${(u.name||'').replace(/'/g,'')}')">✕</button>
        </div>
      </td>
    </tr>`;
  }).join("");

  document.getElementById("table-wrap").innerHTML = `<table>
    <thead><tr>
      <th>Пользователь</th><th>Статус</th><th>Подписка</th>
      <th>Серверы</th><th>Ссылка</th><th></th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// ─── Modal ────────────────────────────────────────────────────────────────────

function openAdd() {
  editId = null;
  document.getElementById("modal-title").textContent = "Новый пользователь";
  document.getElementById("m-name").value = "";
  document.getElementById("m-contact").value = "";
  document.getElementById("m-start").value = today();
  document.getElementById("m-days").value = "30";
  document.getElementById("m-status").value = "active";
  document.getElementById("m-note").value = "";
  regenToken();
  renderServerList([]);
  switchTab("info", document.querySelector(".mtab"));
  document.getElementById("modal").classList.add("open");
}

function editUser(id) {
  const u = users.find(x => x._id === id);
  if (!u) return;
  editId = id;
  document.getElementById("modal-title").textContent = "Редактировать";
  document.getElementById("m-name").value = u.name || "";
  document.getElementById("m-contact").value = u.contact || "";
  document.getElementById("m-start").value = u.start || today();
  document.getElementById("m-days").value = u.days || "30";
  document.getElementById("m-status").value = u.status || "active";
  document.getElementById("m-note").value = u.note || "";
  document.getElementById("m-token").value = u.token || "";
  updateLinkPreview();
  const sel = (() => { try { return JSON.parse(u.servers||"[]"); } catch { return []; } })();
  renderServerList(sel);
  switchTab("info", document.querySelector(".mtab"));
  document.getElementById("modal").classList.add("open");
}

function closeModal() {
  document.getElementById("modal").classList.remove("open");
}

function switchTab(name, el) {
  document.querySelectorAll(".mtab").forEach(t => t.classList.remove("active"));
  if (el) el.classList.add("active");
  ["info","servers","link"].forEach(t => {
    document.getElementById("tab-"+t).style.display = t===name?"block":"none";
  });
  if (name === "link") updateLinkPreview();
}

function renderServerList(selected) {
  if (!servers.length) {
    document.getElementById("srv-list").innerHTML = `<div style="color:var(--text3);padding:1rem">Серверы не найдены в vpn_keys</div>`;
    return;
  }
  document.getElementById("srv-list").innerHTML = servers.map(s => `
    <label class="srv-item">
      <input type="checkbox" id="sc-${s.id}" value="${s.id}" ${selected.includes(s.id)?"checked":""}>
      <div class="srv-item-info">
        <div class="srv-item-name">${s.name || s.id}</div>
        <div class="srv-item-key">${s.key?.slice(0,60)||""}…</div>
      </div>
    </label>
  `).join("");
}

function regenToken() {
  const t = Array.from(crypto.getRandomValues(new Uint8Array(16))).map(b=>b.toString(16).padStart(2,"0")).join("");
  document.getElementById("m-token").value = t;
  updateLinkPreview();
}

function updateLinkPreview() {
  const token = document.getElementById("m-token").value;
  document.getElementById("m-link-preview").textContent = token ? `${BASE_URL}/api/u/${token}` : "—";
}

function copyModalLink() {
  const link = document.getElementById("m-link-preview").textContent;
  copyText(link);
}

async function saveUser() {
  const name = document.getElementById("m-name").value.trim();
  if (!name) { alert("Введите имя"); return; }
  const token = document.getElementById("m-token").value;
  const selectedServers = servers.map(s=>s.id).filter(id => document.getElementById("sc-"+id)?.checked);

  const data = {
    name,
    contact: document.getElementById("m-contact").value.trim(),
    start:   document.getElementById("m-start").value,
    days:    document.getElementById("m-days").value,
    status:  document.getElementById("m-status").value,
    note:    document.getElementById("m-note").value.trim(),
    token,
    servers: JSON.stringify(selectedServers),
  };

  try {
    if (editId) {
      const updated = await api("PUT", `/api/admin/users?id=${editId}`, data);
      const idx = users.findIndex(x => x._id === editId);
      if (idx !== -1) users[idx] = { _id: editId, ...data };
      toast("Сохранено");
    } else {
      const created = await api("POST", "/api/admin/users", data);
      users.push(created);
      toast("Пользователь добавлен");
    }
    closeModal();
    renderStats();
    renderTable();
  } catch(e) {
    alert("Ошибка: " + e.message);
  }
}

async function deleteUser(id, name) {
  if (!confirm(`Удалить ${name}?`)) return;
  try {
    await api("DELETE", `/api/admin/users?id=${id}`);
    users = users.filter(x => x._id !== id);
    renderStats();
    renderTable();
    toast("Удалено");
  } catch(e) {
    alert("Ошибка: " + e.message);
  }
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => toast("Скопировано"));
}

function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2200);
}
</script>
</body>
</html>
